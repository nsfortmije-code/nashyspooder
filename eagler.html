<!DOCTYPE html>
<html>
<head>
  <title>FILE TOO BIG - WILL BE FIXED :3</title>
  <style>
    /* Full-screen GIF background */
    body {
      margin: 0;
      height: 100vh;
      background: url("gif.gif") no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    /* Glowing Coming Soon text */
    h1 {
      font-size: 80px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-align: center;
      animation: glow 1.5s ease-in-out infinite alternate;
      text-shadow:
        0 0 5px #0ff,
        0 0 10px #0ff,
        0 0 20px #0ff,
        0 0 40px #0ff,
        0 0 60px #ff00ff,
        0 0 80px #ff00ff;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 30px #0ff; }
      50% { text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 60px #ff00ff; }
      100% { text-shadow: 0 0 30px #0ff, 0 0 60px #ff00ff, 0 0 90px #ff00ff; }
    }

    /* Optional floating particles behind text */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #0ff;
      border-radius: 50%;
      opacity: 0.8;
      animation: floatParticle 3s infinite;
    }

    @keyframes floatParticle {
      0% { transform: translateY(0px) translateX(0px); opacity: 0.5; }
      50% { transform: translateY(-50px) translateX(20px); opacity: 1; }
      100% { transform: translateY(0px) translateX(0px); opacity: 0.5; }
    }
  </style>
</head>
<body>

<h1>FILE TOO BIG - WILL BE FIXED :3</h1>

<!-- Example particles (duplicate for more) -->
<div class="particle" style="top:30%; left:20%; animation-delay:0s;"></div>
<div class="particle" style="top:60%; left:50%; animation-delay:1s;"></div>
<div class="particle" style="top:40%; left:70%; animation-delay:2s;"></div>
<div class="particle" style="top:80%; left:30%; animation-delay:0.5s;"></div>

</body>
</html>
